name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  # Node 22 LTS (≥22.12.0 satisfies rolldown's @rolldown/binding-* engine
  # requirement of `^20.19.0 || >=22.12.0`. Node 20.18 silently skipped the
  # linux-x64-gnu binding install — pnpm correctly honored the engine
  # constraint, but the supportedArchitectures + .npmrc / pnpm-workspace.yaml
  # config can't paper over an unsatisfied engine field).
  NODE_VERSION: '22'
  PNPM_VERSION: '10.22.0'

jobs:
  hygiene:
    name: hygiene (Finder dups + author check)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Reject Finder duplicate files
        run: node scripts/find-finder-dups.mjs
      - name: Verify commit authors on PR
        if: github.event_name == 'pull_request'
        run: |
          required="audri@walthamdatascience.com"
          base_sha="${{ github.event.pull_request.base.sha }}"
          head_sha="${{ github.event.pull_request.head.sha }}"
          bad=$(git log "$base_sha..$head_sha" --pretty=format:'%H %ae' | awk -v want="$required" '$2 != want { print $0 }')
          if [ -n "$bad" ]; then
            echo "❌ PR has commits with non-$required author:" >&2
            echo "$bad" >&2
            exit 1
          fi
          echo "✅ All PR commits authored as $required."

  install:
    name: install (cached)
    runs-on: ubuntu-latest
    outputs:
      pnpm-cache-key: ${{ steps.cache.outputs.cache-primary-key }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
      - id: cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.pnpm-store
            node_modules
            apps/*/node_modules
          key: pnpm-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            pnpm-${{ runner.os }}-
      - run: pnpm install --frozen-lockfile

  lint:
    name: lint
    runs-on: ubuntu-latest
    needs: install
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: '${{ env.PNPM_VERSION }}' }
      - uses: actions/setup-node@v4
        with: { node-version: '${{ env.NODE_VERSION }}', cache: 'pnpm' }
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint

  typecheck:
    name: typecheck
    runs-on: ubuntu-latest
    needs: install
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: '${{ env.PNPM_VERSION }}' }
      - uses: actions/setup-node@v4
        with: { node-version: '${{ env.NODE_VERSION }}', cache: 'pnpm' }
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck

  unit:
    name: unit (with coverage)
    runs-on: ubuntu-latest
    needs: install
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: '${{ env.PNPM_VERSION }}' }
      - uses: actions/setup-node@v4
        with: { node-version: '${{ env.NODE_VERSION }}', cache: 'pnpm' }
      - run: pnpm install --frozen-lockfile
      - run: pnpm test:coverage

  build:
    name: build
    runs-on: ubuntu-latest
    needs: install
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: '${{ env.PNPM_VERSION }}' }
      - uses: actions/setup-node@v4
        with: { node-version: '${{ env.NODE_VERSION }}', cache: 'pnpm' }
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
        env:
          NODE_ENV: production
      - name: Bundle size budget
        run: pnpm bundle-size
      - uses: actions/upload-artifact@v4
        with:
          name: next-build
          path: apps/web/.next
          retention-days: 3
          include-hidden-files: true
          if-no-files-found: error

  e2e:
    name: e2e (playwright)
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: '${{ env.PNPM_VERSION }}' }
      - uses: actions/setup-node@v4
        with: { node-version: '${{ env.NODE_VERSION }}', cache: 'pnpm' }
      - run: pnpm install --frozen-lockfile
      - uses: actions/download-artifact@v4
        with:
          name: next-build
          path: apps/web/.next
      - run: pnpm exec playwright install --with-deps chromium firefox
        working-directory: apps/web
      - run: pnpm test:e2e
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: apps/web/playwright-report
          retention-days: 7

  security:
    name: security (pnpm audit)
    runs-on: ubuntu-latest
    needs: install
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: '${{ env.PNPM_VERSION }}' }
      - uses: actions/setup-node@v4
        with: { node-version: '${{ env.NODE_VERSION }}', cache: 'pnpm' }
      - run: pnpm install --frozen-lockfile
      - run: pnpm audit --audit-level=moderate
