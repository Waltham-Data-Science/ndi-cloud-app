name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  # Node 22 LTS (≥22.12.0 satisfies rolldown's @rolldown/binding-* engine
  # requirement of `^20.19.0 || >=22.12.0`. Node 20.18 silently skipped the
  # linux-x64-gnu binding install — pnpm correctly honored the engine
  # constraint, but the supportedArchitectures + .npmrc / pnpm-workspace.yaml
  # config can't paper over an unsatisfied engine field).
  NODE_VERSION: '22'
  PNPM_VERSION: '10.22.0'

jobs:
  hygiene:
    name: hygiene (Finder dups + author check)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Reject Finder duplicate files
        run: node scripts/find-finder-dups.mjs
      - name: Verify commit authors on PR
        if: github.event_name == 'pull_request'
        run: |
          # Allowlist mirrors .githooks/pre-push exactly. See that hook
          # for the rationale on why GitHub's squash-merge noreply is
          # allowed alongside the canonical email — keeps rebases onto
          # main green after PR squash-merges land noreply commits.
          allowlist_re='^(audri@walthamdatascience\.com|[0-9]+\+audriB@users\.noreply\.github\.com)$'
          base_sha="${{ github.event.pull_request.base.sha }}"
          head_sha="${{ github.event.pull_request.head.sha }}"
          bad=$(git log "$base_sha..$head_sha" --pretty=format:'%H %ae' \
            | awk -v re="$allowlist_re" '$2 !~ re { print $0 }')
          if [ -n "$bad" ]; then
            echo "❌ PR has commits with non-allowlisted author:" >&2
            echo "$bad" >&2
            echo "" >&2
            echo "Allowed authors:" >&2
            echo "  - audri@walthamdatascience.com (canonical)" >&2
            echo "  - <id>+audriB@users.noreply.github.com (GitHub squash-merge)" >&2
            exit 1
          fi
          echo "✅ All PR commits author-allowlisted."

  install:
    name: install (cached)
    runs-on: ubuntu-latest
    outputs:
      pnpm-cache-key: ${{ steps.cache.outputs.cache-primary-key }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
      - id: cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.pnpm-store
            node_modules
            apps/*/node_modules
          key: pnpm-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            pnpm-${{ runner.os }}-
      - run: pnpm install --frozen-lockfile

  lint:
    name: lint
    runs-on: ubuntu-latest
    needs: install
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: '${{ env.PNPM_VERSION }}' }
      - uses: actions/setup-node@v4
        with: { node-version: '${{ env.NODE_VERSION }}', cache: 'pnpm' }
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint

  typecheck:
    name: typecheck
    runs-on: ubuntu-latest
    needs: install
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: '${{ env.PNPM_VERSION }}' }
      - uses: actions/setup-node@v4
        with: { node-version: '${{ env.NODE_VERSION }}', cache: 'pnpm' }
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck

  unit:
    name: unit (with coverage)
    runs-on: ubuntu-latest
    needs: install
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: '${{ env.PNPM_VERSION }}' }
      - uses: actions/setup-node@v4
        with: { node-version: '${{ env.NODE_VERSION }}', cache: 'pnpm' }
      - run: pnpm install --frozen-lockfile
      - run: pnpm test:coverage

  build:
    name: build
    runs-on: ubuntu-latest
    needs: install
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: '${{ env.PNPM_VERSION }}' }
      - uses: actions/setup-node@v4
        with: { node-version: '${{ env.NODE_VERSION }}', cache: 'pnpm' }
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
        env:
          NODE_ENV: production
      - name: Bundle size budget
        run: pnpm bundle-size
      - uses: actions/upload-artifact@v4
        with:
          name: next-build
          path: apps/web/.next
          retention-days: 3
          include-hidden-files: true
          if-no-files-found: error

  e2e:
    name: e2e (playwright)
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: '${{ env.PNPM_VERSION }}' }
      - uses: actions/setup-node@v4
        with: { node-version: '${{ env.NODE_VERSION }}', cache: 'pnpm' }
      - run: pnpm install --frozen-lockfile
      - uses: actions/download-artifact@v4
        with:
          name: next-build
          path: apps/web/.next
      - run: pnpm exec playwright install --with-deps chromium firefox
        working-directory: apps/web
      - run: pnpm test:e2e
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: apps/web/playwright-report
          retention-days: 7

  security:
    name: security (pnpm audit)
    runs-on: ubuntu-latest
    needs: install
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: '${{ env.PNPM_VERSION }}' }
      - uses: actions/setup-node@v4
        with: { node-version: '${{ env.NODE_VERSION }}', cache: 'pnpm' }
      - run: pnpm install --frozen-lockfile
      - run: pnpm audit --audit-level=moderate

  gitleaks:
    # O9: secret-scanning backstop. Runs on every PR + push to main so a
    # commit that slipped past the local pre-commit hook (or a contributor
    # who hasn't activated `git config core.hooksPath .githooks`) still
    # gets caught before merge.
    #
    # The hook scans the staged diff; CI scans the full PR diff (`git
    # log base..head`) so a multi-commit PR with a secret added then
    # removed in different commits is still caught — the secret is in
    # history even if not in the final tree.
    name: gitleaks (secret scan)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # gitleaks needs full history to scan PR ranges
      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # `GITLEAKS_LICENSE` is only required for the org-level
          # GitHub-app integration; the standalone scan path used here
          # works without it. We don't set it.
