packages:
  - 'apps/*'

# Optional native binaries for these platforms are installed regardless of
# the current machine. Ensures a macOS-authored pnpm-lock.yaml works on Linux
# CI runners — specifically needed for rolldown (Vitest 4 dep) which has
# per-platform `@rolldown/binding-*` optional packages. Without this, a
# frozen lockfile install on Linux misses `@rolldown/binding-linux-x64-gnu`
# and Vitest crashes at startup with "Cannot find native binding".
supportedArchitectures:
  os:
    - darwin
    - linux
  cpu:
    - x64
    - arm64
  libc:
    - glibc
    - musl
