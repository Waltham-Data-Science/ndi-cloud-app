<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 295 305" role="img" aria-label="NDI Cloud">
  <!--
    NDI Cloud favicon — square mark extracted from
    /public/logos/ndicloud-mark-color.svg's `cls-2` paths (the
    interlocking-corner brand symbol; the long horizontal wordmark
    isn't readable at favicon scale).

    Audit 2026-04-27 #22 — pre-fix, browsers requested /favicon.ico
    on every page and got a 404 because the app declared no icon.
    Next.js's `app/icon.svg` convention auto-emits
    `<link rel="icon" type="image/svg+xml" href="…">` and serves the
    file with the right Content-Type, satisfying both modern browsers
    (which prefer SVG) and the legacy /favicon.ico fallback (Next
    serves the convention asset on both paths).

    Color: brand-navy (#002054) for the symbol, on transparent
    background — matches the marketing Header's navy and reads
    cleanly on light + dark browser tab backgrounds.
  -->
